
exp_name: method1_clip_shortcut
seed: 42

eval:
  hair_leak_check: true
  sanity_compare: true
  debug_hair_masks: true
  #prompt: "a portrait photo of a person"
  enabled: true
  every_steps: 200
  seed: 123
  num_inference_steps: 50

data:
  train_dir: /content/datasets/ffhq_sub/train
  val_dir: /content/datasets/ffhq_sub/val
  image_size: 512

models:
  sd_model_id: runwayml/stable-diffusion-v1-5
  arc2face_repo_id: FoivosPar/Arc2Face
  clip_vision_id: openai/clip-vit-large-patch14
  hair_parsing_weights: /content/weights/79999_iter.pth   # пример: положишь сюда

cond:
  n_tokens: 4
  scale_id: 0.0
  scale_hair: 1.0
  hair_bg_value: 0.0
  hair_class: 17

train:
  batch_size: 2
  lr: 7e-5
  dual_lr_mult: 1.5
  hair_aux_weight: 0.5
  cross_hair_clip_weight: 0.2
  cross_hair_clip_every: 8
  cross_hair_clip_batch: 1
  cross_hair_decode_size: 256
  weight_decay: 0.0
  max_steps: 5000
  log_every: 25
  save_every: 500
  mixed_precision: fp16

infer:
  steps: 30
